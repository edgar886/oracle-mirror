            const key = `oracle_${memberKey}_${section}_${period}`;
            localStorage.setItem(key, JSON.stringify({ text, timestamp: Date.now() }));
            const token = getAuthToken();
            if (token) {
                fetch('/api/readings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ memberKey, section, period, text })
                }).catch(() => {});
            }
        }

            const key = `oracle_${memberKey}_${section}_${period}`;
            const data = localStorage.getItem(key);
            return data ? JSON.parse(data) : null;
        }

        function clearReading(memberKey, section, period) {
            localStorage.removeItem(`oracle_${memberKey}_${section}_${period}`);
            const token = getAuthToken();
            if (token) {
                fetch('/api/readings', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ memberKey, section, period })
                }).catch(() => {});
            }
        }

            try {
                const res = await fetch('/api/readings', {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) return;
                const { readings } = await res.json();
                if (!readings) return;
                Object.entries(readings).forEach(([key, serverData]) => {
                    const localRaw = localStorage.getItem(key);
                    if (!localRaw) {
                        localStorage.setItem(key, JSON.stringify(serverData));
                    } else {
                        const localData = JSON.parse(localRaw);
                        if (serverData.timestamp > localData.timestamp) {
                            localStorage.setItem(key, JSON.stringify(serverData));
                        }
                    }
                });
            } catch (e) {
                console.log('Server sync unavailable, using localStorage only');
            }

            const degree = normalizedLon % 30;
            const sign = ZODIAC_SIGNS[Math.min(signIndex, 11)];
            const symbol = ZODIAC_SYMBOLS[Math.min(signIndex, 11)];
            return { sign, symbol, degree: degree.toFixed(2), longitude: normalizedLon };

                    try {
                        const vector = Astronomy.GeoVector(planet, now, true);
                        const ecl = Astronomy.Ecliptic(vector);
                        positions[planet.toLowerCase()] = getLongitudeToZodiac(ecl.elon);
                    } catch (e) {
                        positions[planet.toLowerCase()] = { sign: 'Aries', symbol: '♈', degree: '0.00', longitude: 0 };
                    }
                });

                return positions;
            } catch (e) {
                console.error('Error calculating positions:', e);
                return {};
            }
        }

        function getMoonPhaseInfo(date = new Date()) {
            try {
                const phase = Astronomy.MoonPhase(date);
                const phasePercent = ((phase + 180) / 360 * 100).toFixed(1);
                let phaseName = '';
                if (phase < 11.25 || phase >= 348.75) phaseName = 'New Moon';
                else if (phase < 78.75) phaseName = 'Waxing Crescent';
                else if (phase < 101.25) phaseName = 'First Quarter';
                else if (phase < 168.75) phaseName = 'Waxing Gibbous';
                else if (phase < 191.25) phaseName = 'Full Moon';
                else if (phase < 258.75) phaseName = 'Waning Gibbous';
                else if (phase < 281.25) phaseName = 'Last Quarter';
                else phaseName = 'Waning Crescent';
                return { phaseName, phasePercent, phase };
            } catch (e) {
                return { phaseName: 'Full Moon', phasePercent: '50', phase: 180 };
            }
        }

                        if (diff < 8 || diff > 352) aspectType = { name: 'Conjunction', color: '#d4af37', tolerance: 8 };

                                p2: keys[j],
                                lon1,
                                lon2,

        function TransitsTab({ member, memberKey }) {
            const [period, setPeriod] = useState('hoy');

                const allPeriods = ['hoy','semana','mes','ano','3anos','5anos','decada'];
                allPeriods.forEach(p => {

                    if (stored) cached[p] = stored.text;
                });
                return cached;
            });
            const [loadingPeriod, setLoadingPeriod] = useState('');

            function seededRandom(seed) {
                const x = Math.sin(seed) * 10000;
                return x - Math.floor(x);
            }

            function getChartDataForPeriod(p) {
                const hash = (str) => {
                    let h = 0;
                    for (let i = 0; i < str.length; i++) h = ((h << 5) - h) + str.charCodeAt(i);
                    return h;
                };
                const baseSeed = hash(member.name + p);

                if (p === 'hoy') {
                    const hours = [];
                    for (let i = 0; i < 24; i++) {
                        const baseEnergy = 5 + 2 * Math.sin((i - 6) * Math.PI / 12);
                        const randomFactor = seededRandom(baseSeed + i) * 1.5;
                        hours.push({ hour: `${i}:00`, energy: Math.max(1, Math.min(10, baseEnergy + randomFactor)) });
                    }
                    return hours;
                } else if (p === 'semana') {
                    const days = ['Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb', 'Dom'];
                    return days.map((day, i) => ({
                        day,
                        energy: Math.max(2, Math.min(10, 5 + seededRandom(baseSeed + i) * 4))
                    }));
                } else if (p === 'mes') {
                    return ['Semana 1', 'Semana 2', 'Semana 3', 'Semana 4'].map((week, i) => ({
                        week,
                        energy: Math.max(2, Math.min(10, 5 + seededRandom(baseSeed + i) * 4))
                    }));
                } else if (p === 'ano') {
                    return member.monthlyEnergy2026.map((val, i) => ({
                        month: ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][i],
                        energy: val
                    }));
                } else if (p === '3anos') {
                    return [
                        { year: '2026', energy: 6 + seededRandom(baseSeed) * 3 },
                        { year: '2027', energy: 5 + seededRandom(baseSeed + 1) * 3 },
                        { year: '2028', energy: 7 + seededRandom(baseSeed + 2) * 3 }
                    ];
                } else if (p === '5anos') {
                    return Array.from({ length: 5 }, (_, i) => ({
                        year: String(2026 + i),
                        energy: 5 + seededRandom(baseSeed + i) * 4
                    }));
                } else if (p === 'decada') {
                    return Array.from({ length: 11 }, (_, i) => ({
                        year: String(2026 + i),
                        energy: 5 + seededRandom(baseSeed + i) * 4
                    }));
                }
            }

            const chartData = getChartDataForPeriod(period);

            const periods = [
                { id: 'hoy', label: 'Hoy', icon: '☀️' },
                { id: 'semana', label: 'Semana', icon: '📅' },
                { id: 'mes', label: 'Mes', icon: '🌙' },

                { id: '5anos', label: '5 Años', icon: '🌌' },
                { id: 'decada', label: 'Década', icon: '♾️' }

                                                            {isExpanded ? '▲' : '▼'}
                                                        </button>
                                                        <button onClick={() => refreshHighlight(p.id)} className="text-xs px-2 py-0.5 rounded bg-white/5 text-gray-400 hover:text-yellow-300 transition-all">
                                                            🔄
                                                        </button>
                                                    </div>
                                                )}
                                            </div>

                                            {isLoading && (
                                                <div className="flex items-center gap-2 py-4 justify-center">
                                                    <div className="w-5 h-5 border-2 border-yellow-300 border-t-transparent rounded-full animate-spin"></div>
                                                    <span className="text-yellow-300 text-xs italic">Consultando...</span>
                                                </div>
                                            )}

                                            {hasContent && !isLoading && (
                                                <div className={`text-xs text-gray-300 leading-relaxed ${isExpanded ? '' : 'line-clamp-4'}`} style={{ whiteSpace: 'pre-wrap' }}>
                                                    {highlights[p.id]}
                                                </div>
                                            )}

                                            {!hasContent && !isLoading && (
                                                <button onClick={() => generateHighlight(p.id)}
                                                    className="w-full py-3 text-xs rounded-lg font-semibold text-gray-400 border border-dashed border-yellow-600/30 hover:border-yellow-400/60 hover:text-yellow-300 transition-all">
                                                    Generar
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {/* Summary radar chart */}
                    {completedCount >= 3 && (
                        <div className="cosmic-card p-6">
                            <h4 className="text-lg font-bold gradient-text mb-4">Energy Overview</h4>
                            <ResponsiveContainer width="100%" height={300}>
                                <RadarChart data={highlightPeriods.map(p => {
                                    const content = highlights[p.id] || '';
                                    const energyMatch = content.match(/ENERGÍA:\s*\[?(\d+)/i);
                                    return {
                                        period: p.label,
                                        energy: energyMatch ? parseInt(energyMatch[1]) : 5
                                    };
                                })}>
                                    <PolarGrid stroke="rgba(212,175,55,0.2)" />
                                    <PolarAngleAxis dataKey="period" stroke="#808080" style={{ fontSize: '11px' }} />
                                    <PolarRadiusAxis angle={90} domain={[0, 10]} stroke="rgba(212,175,55,0.3)" />
                                    <Radar name="Energy" dataKey="energy" stroke="#f0d78c" fill="#d4af37" fillOpacity={0.3} dot={{ fill: '#f0d78c', r: 3 }} />
                                </RadarChart>
                            </ResponsiveContainer>
                        </div>
                    )}
                </div>
            );
        }

        function AIOracle({ member }) {
            const [question, setQuestion] = useState('');
            const [response, setResponse] = useState('');
            const [loading, setLoading] = useState(false);
            const consulOracle = async () => {
                if (!question.trim()) return;
                setLoading(true);
                setResponse('');

                try {
                    const oraclePrompt = `Eres El Oráculo, un astrólogo místico que proporciona interpretaciones profundas y perspicaces. Hablas con sabiduría y autoridad mística. Siempre responde en el idioma en que el usuario escribe. Proporciona interpretaciones astrológicas ricas basadas en los datos proporcionados.

Información del consultante:
Nombre: ${member.name}
Nacido: ${member.born} en ${member.birthPlace}
Sol: ${member.western.sun.sign} ${member.western.sun.degree}
Luna: ${member.western.moon.sign} ${member.western.moon.degree}
Signo Chino: ${member.chinese.fullSign}
Arcano: ${member.tarot}
Enneagrama: ${member.enneagram}

Pregunta del consultante: ${question}`;

                    const resp = await fetch('/api/interpret', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ prompt: oraclePrompt, max_tokens: 1500 })
                    });

                    const data = await resp.json();
                    if (data.error) {
                        setResponse('Error: ' + data.error);
                    } else {
                        setResponse(data.content?.[0]?.text || 'El Oráculo no pudo responder.');
                    }
                } catch (error) {
                    setResponse(`Error de conexión: ${error.message}`);
                }

                setLoading(false);
            };

            return (
                <div className="space-y-6">
                    <div className="cosmic-card p-6">
                        <h4 className="text-xl font-bold gradient-text mb-4">Consult the Oracle</h4>

                        <div className="mb-4">
                            <label className="block text-sm text-gray-400 mb-2">Tu Pregunta al Oráculo</label>
                            <textarea
                                value={question}
                                onChange={(e) => setQuestion(e.target.value)}
                                className="w-full px-3 py-2 bg-black/50 border border-yellow-600/30 rounded text-white focus:outline-none focus:border-yellow-400"
                                rows="4"
                                placeholder="Ask the Oracle about your cosmic path..."
                            />
                        </div>

                        <button
                            onClick={consulOracle}
                            disabled={loading}
                            className="w-full px-4 py-2 bg-gradient-to-r from-yellow-600/50 to-yellow-500/30 text-white font-semibold rounded hover:from-yellow-600/70 hover:to-yellow-500/50 disabled:opacity-50 disabled:cursor-not-allowed transition-all"
                        >
                            {loading ? 'Consulting...' : 'Consult the Oracle'}
                        </button>
                    </div>

                    {response && (
                        <div className="cosmic-card p-6 border-yellow-600/50">
                            <h4 className="text-lg font-bold gradient-text mb-4">Oracle's Response</h4>
                            <p className="text-gray-200 leading-relaxed whitespace-pre-wrap">{response}</p>
                        </div>
                    )}
                </div>
            );
        }

        // ==================== PERSON CONTAINER ====================
        function PersonContainer({ personKey }) {
            const member = familyMembers[personKey];
            const [activeTab, setActiveTab] = useState('highlights');

            const tabs = [
                { id: 'highlights', label: '🔑 Key', component: KeyHighlights },
                { id: 'perfil', label: 'Perfil', component: PerfilTab },
                { id: 'natal', label: 'Natal Chart', component: NatalChartTab },
                { id: 'vedic', label: 'Vedic', component: VedicAstrology },
                { id: 'numerology', label: 'Numerology', component: NumerologyTab },
                { id: 'chinese', label: 'Chinese', component: ChineseAstrology },
                { id: 'esoteric', label: 'Esoteric', component: EsotericSystems },
                { id: 'oracle', label: 'AI Oracle', component: AIOracle }
            ];

            return (
                <div>
                    <div className="flex flex-wrap gap-2 mb-6 border-b border-yellow-600/30 pb-4">
                        {tabs.map(tab => (
                            <button
                                key={tab.id}
                                onClick={() => setActiveTab(tab.id)}
                                className={`tab-button ${activeTab === tab.id ? 'active' : ''}`}
                            >
                                {tab.label}
                            </button>
                        ))}
                    </div>

                    <div className="tab-content">
                        {tabs.find(t => t.id === activeTab)?.component &&
                            React.createElement(tabs.find(t => t.id === activeTab).component, { member, memberKey: personKey })
                        }
                    </div>
                </div>
            );
        }

        // ==================== FAMILY SELECTOR ====================
        function FamilySelector({ selected, onSelect }) {
            const members = Object.keys(familyMembers);

            return (
                <div className="flex flex-wrap gap-4 justify-center mb-8">
                    {members.map(key => {
                        const member = familyMembers[key];
                        const sunSign = member.western.sun.sign;
                        const isActive = selected === key;

                        return (
                            <button
                                key={key}
                                onClick={() => onSelect(key)}
                                className={`relative w-20 h-20 rounded-full transition-all ${isActive ? 'glow-gold scale-110' : 'hover:scale-105'}`}
                                style={{
                                    background: isActive ? 'linear-gradient(135deg, rgba(212, 175, 55, 0.3), rgba(240, 215, 140, 0.1))' : 'linear-gradient(135deg, rgba(17, 17, 17, 0.8), rgba(25, 25, 25, 0.8))',
                                    border: isActive ? '2px solid #d4af37' : '1px solid rgba(212, 175, 55, 0.3)',
                                    opacity: member.isPending ? 0.7 : 1
                                }}
                            >
                                <div className="w-full h-full flex flex-col items-center justify-center">
                                    <div className="text-2xl">{member.isPending ? '✨' : ZODIAC_SYMBOLS[ZODIAC_SIGNS.indexOf(sunSign)]}</div>
                                    <div className="text-xs text-yellow-300 font-semibold mt-1">{member.name.split(' ')[0]}</div>
                                </div>
                            </button>
                        );
                    })}
                    <button
                        onClick={() => onSelect('family')}
                        className={`relative w-20 h-20 rounded-full transition-all ${selected === 'family' ? 'glow-gold scale-110' : 'hover:scale-105'}`}
                        style={{
                            background: selected === 'family' ? 'linear-gradient(135deg, rgba(212, 175, 55, 0.3), rgba(240, 215, 140, 0.1))' : 'linear-gradient(135deg, rgba(17, 17, 17, 0.8), rgba(25, 25, 25, 0.8))',
                            border: selected === 'family' ? '2px solid #d4af37' : '1px solid rgba(212, 175, 55, 0.3)'
                        }}
                    >
                        <div className="w-full h-full flex flex-col items-center justify-center">
                            <div className="text-2xl">👨‍👩‍👧‍👦</div>
                            <div className="text-xs text-yellow-300 font-semibold mt-1">Familia</div>
                        </div>
                    </button>
                </div>
            );
        }

        // ==================== FAMILY VIEW (PLACEHOLDER) ====================
        function FamilyView() {
            return (
                <div className="cosmic-card p-8">
                    <h3 className="text-3xl font-bold gradient-text mb-4">Familia Boone</h3>
                    <p className="text-gray-300">Family visualization features coming soon...</p>
                </div>
            );
        }

        // ==================== LOGIN SCREEN ====================
        function LoginScreen({ onLogin }) {
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            async function handleLogin(e) {
                e.preventDefault();
                setError('');
                setLoading(true);
                try {
                    const resp = await fetch('/api/auth', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username: username.trim(), password })
                    });
                    const data = await resp.json();
                    if (resp.ok && data.success) {
                        sessionStorage.setItem('oracle_token', data.token);
                        sessionStorage.setItem('oracle_user', data.user);
                        await syncReadingsFromServer(data.token);
                        onLogin(data.user, data.displayName);
                    } else {
                        setError(data.error || 'Credenciales inválidas');
                    }
                } catch (err) {
                    setError('Error de conexión. Intenta de nuevo.');
                }
                setLoading(false);
            }

            return (
                <div className="min-h-screen flex items-center justify-center relative" style={{ background: 'linear-gradient(135deg, #000000 0%, #0a0a0a 50%, #111111 100%)' }}>
                    <StarfieldBackground />
                    <div className="relative z-10 w-full max-w-md mx-4">
                        <div className="text-center mb-8">
                            <h1 className="text-5xl md:text-6xl font-bold gradient-text gold-shimmer mb-3" style={{ fontFamily: 'Cinzel, serif' }}>
                                The Oracle's Mirror
                            </h1>
                            <p className="text-yellow-300 text-lg" style={{ fontFamily: 'Playfair Display, serif' }}>
                                Boone Family Cosmic Portal
                            </p>
                            <div className="mt-4 text-6xl">🔮</div>
                        </div>

                        <form onSubmit={handleLogin} className="cosmic-card p-8 space-y-6">
                            <h2 className="text-2xl font-bold text-center gradient-text" style={{ fontFamily: 'Cinzel, serif' }}>
                                Acceso al Portal
                            </h2>

                            {error && (
                                <div className="bg-red-900/30 border border-red-500/50 rounded-lg p-3 text-center">
                                    <p className="text-red-300 text-sm">⚠️ {error}</p>
                                </div>
                            )}

                            <div>
                                <label className="block text-yellow-300 text-sm font-semibold mb-2" style={{ fontFamily: 'Cinzel, serif' }}>
                                    ✦ Usuario
                                </label>
                                <input
                                    type="text"
                                    value={username}
                                    onChange={e => setUsername(e.target.value)}
                                    className="w-full px-4 py-3 rounded-lg bg-black/50 border border-yellow-600/30 text-white placeholder-gray-500 focus:outline-none focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400/50 transition-all"
                                    placeholder="Tu nombre de usuario"
                                    autoComplete="username"
                                    required
                                />
                            </div>

                            <div>
                                <label className="block text-yellow-300 text-sm font-semibold mb-2" style={{ fontFamily: 'Cinzel, serif' }}>
                                    ✦ Contraseña
                                </label>
                                <input
                                    type="password"
                                    value={password}
                                    onChange={e => setPassword(e.target.value)}
                                    className="w-full px-4 py-3 rounded-lg bg-black/50 border border-yellow-600/30 text-white placeholder-gray-500 focus:outline-none focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400/50 transition-all"
                                    placeholder="Tu contraseña"
                                    autoComplete="current-password"
                                    required
                                />
                            </div>

                            <button
                                type="submit"
                                disabled={loading}
                                className="w-full py-3 rounded-lg font-bold text-lg transition-all hover:scale-105 disabled:opacity-50 disabled:hover:scale-100"
                                style={{ background: 'linear-gradient(135deg, #d4af37, #f0d78c)', color: '#000000', fontFamily: 'Cinzel, serif' }}
                            >
                                {loading ? (
                                    <span className="flex items-center justify-center gap-2">
                                        <span className="w-5 h-5 border-2 border-current border-t-transparent rounded-full animate-spin"></span>
                                        Consultando los astros...
                                    </span>
                                ) : (
                                    '✨ Entrar al Portal ✨'
                                )}
                            </button>
                        </form>

                        <p className="text-center text-gray-500 text-xs mt-6">
                            Portal exclusivo para la Familia Boone
                        </p>
                    </div>
                </div>
            );
        }

        // ==================== MAIN APP ====================
        function OracleMirror() {
            const [selectedMember, setSelectedMember] = useState('edgar');
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [currentUser, setCurrentUser] = useState('');
            const [displayName, setDisplayName] = useState('');
            const [authChecking, setAuthChecking] = useState(true);

            useEffect(() => {
                async function checkSession() {
                    const token = sessionStorage.getItem('oracle_token');
                    if (!token) {
                        setAuthChecking(false);
                        return;
                    }
                    try {
                        const resp = await fetch('/api/verify', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ token })
                        });
                        const data = await resp.json();
                        if (data.valid) {
                            await syncReadingsFromServer(token);
                            setIsAuthenticated(true);
                            setCurrentUser(data.user);
                            setDisplayName(data.displayName);
                        } else {
                            sessionStorage.removeItem('oracle_token');
                            sessionStorage.removeItem('oracle_user');
                        }
                    } catch (e) {
                        sessionStorage.removeItem('oracle_token');
                        sessionStorage.removeItem('oracle_user');
                    }
                    setAuthChecking(false);
                }
                checkSession();
            }, []);

            function handleLogin(user, name) {
                setIsAuthenticated(true);
                setCurrentUser(user);
                setDisplayName(name);
            }

            function handleLogout() {
                sessionStorage.removeItem('oracle_token');
                sessionStorage.removeItem('oracle_user');
                setIsAuthenticated(false);
                setCurrentUser('');
                setDisplayName('');
            }

            if (authChecking) {
                return (
                    <div className="min-h-screen flex items-center justify-center" style={{ background: 'linear-gradient(135deg, #000000 0%, #0a0a0a 50%, #111111 100%)' }}>
                        <div className="text-center">
                            <div className="text-6xl mb-4">🔮</div>
                            <div className="w-10 h-10 border-4 border-yellow-300 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                            <p className="text-yellow-300" style={{ fontFamily: 'Cinzel, serif' }}>Alineando los astros...</p>
                        </div>
                    </div>
                );
            }

            if (!isAuthenticated) {
                return <LoginScreen onLogin={handleLogin} />;
            }

            return (
                <div className="main-content">
                    <StarfieldBackground />

                    <header className="sticky top-0 z-10 bg-gradient-to-b from-black/80 to-transparent backdrop-blur-md border-b border-yellow-600/20 py-6 mb-8">
                        <div className="max-w-7xl mx-auto px-4">
                            <div className="flex justify-between items-center">
                                <div className="flex-1"></div>
                                <div className="text-center flex-shrink-0">
                                    <h1 className="text-3xl sm:text-5xl md:text-6xl font-bold gradient-text gold-shimmer mb-2" style={{ fontFamily: 'Cinzel, serif' }}>
                                        The Oracle's Mirror
                                    </h1>
                                    <p className="text-yellow-300 text-lg" style={{ fontFamily: 'Playfair Display, serif' }}>
                                        Boone Family Cosmic Portal
                                    </p>
                                </div>
                                <div className="flex-1 flex justify-end items-center gap-3">
                                    <span className="text-yellow-300 text-sm hidden md:inline" style={{ fontFamily: 'Cinzel, serif' }}>
                                        ✦ {displayName}
                                    </span>
                                    <button
                                        onClick={handleLogout}
                                        className="px-3 py-1.5 rounded-lg text-xs font-semibold bg-black/30 text-gray-400 border border-yellow-600/20 hover:text-yellow-300 hover:border-yellow-400/50 transition-all"
                                    >
                                        Salir
                                    </button>
                                </div>
                            </div>
                        </div>
                    </header>

                    <div className="max-w-7xl mx-auto px-4 pb-12">
                        <LiveSkyDashboard />
                        <FamilySelector selected={selectedMember} onSelect={setSelectedMember} />

                        {selectedMember === 'family' ? (
                            <FamilyView />
                        ) : (
                            <PersonContainer personKey={selectedMember} />
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<OracleMirror />);
    </script>
</body>
</html>
