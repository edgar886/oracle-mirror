        /* Starfield Animation */
        @keyframes twinkle {

        }

        .starfield-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;

        }

        .star {

        .main-content {

        /* Gold Shimmer */

            0%, 100% { text-shadow: 0 0 10px rgba(212, 165, 116, 0.3); }

        /* Glow effect */

        /* Pulsing animation */

            0%, 100% { box-shadow: 0 0 10px rgba(212, 165, 116, 0.4); }

        /* Text gradient */
        .gradient-text {
            background: linear-gradient(135deg, #d4a574, #f0d78c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Smooth transitions */
        .transition-smooth {

        /* Tab styling */
        .tab-button {
            position: relative;
            padding: 0.75rem 1.5rem;
            background: transparent;
            color: #a0a0a0;
            border: none;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            font-weight: 500;

        .tab-button.active {

            box-shadow: 0 2px 8px rgba(240, 215, 140, 0.4);

        .tab-button:hover {

        /* Card styling */

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;

        ::-webkit-scrollbar-track {

        }

            }

            }

        // ==================== ASTRONOMICAL CALCULATIONS ====================
        const ZODIAC_SIGNS = ['Aries', 'Taurus', 'Gemini', 'Cancer', 'Leo', 'Virgo', 'Libra', 'Scorpio', 'Sagittarius', 'Capricorn', 'Aquarius', 'Pisces'];
        const ZODIAC_SYMBOLS = ['♈', '♉', '♊', '♋', '♌', '♍', '♎', '♏', '♐', '♑', '♒', '♓'];
        const PLANET_SYMBOLS = {
            'Sun': '☉',
            'Moon': '☽',
            'Mercury': '☿',
            'Venus': '♀',
            'Mars': '♂',
            'Jupiter': '♃',
            'Saturn': '♄',
            'Uranus': '♅',
            'Neptune': '♆',
            'Pluto': '♇'
        };

        function getLongitudeToZodiac(longitude) {
            const normalizedLon = ((longitude % 360) + 360) % 360;
            const signIndex = Math.floor(normalizedLon / 30);
            const degree = normalizedLon % 30;
            const sign = ZODIAC_SIGNS[Math.min(signIndex, 11)];
            const symbol = ZODIAC_SYMBOLS[Math.min(signIndex, 11)];
            return { sign, symbol, degree: degree.toFixed(2), longitude: normalizedLon };
        }

        function getCurrentPlanetaryPositions() {
            try {
                const now = new Date();
                const positions = {};

                try {
                    const sunEcl = Astronomy.SunPosition(now);
                    positions.sun = getLongitudeToZodiac(sunEcl.elon);
                } catch (e) {
                    positions.sun = { sign: 'Aries', symbol: '♈', degree: '0.00', longitude: 0 };
                }

                try {
                    const moonEcl = Astronomy.EclipticGeoMoon(now);
                    positions.moon = getLongitudeToZodiac(moonEcl.lon);
                } catch (e) {
                    positions.moon = { sign: 'Cancer', symbol: '♋', degree: '0.00', longitude: 0 };
                }

                const planets = ['Mercury', 'Venus', 'Mars', 'Jupiter', 'Saturn', 'Uranus', 'Neptune', 'Pluto'];
                planets.forEach(planet => {
                    try {
                        const vector = Astronomy.GeoVector(planet, now, true);
                        const ecl = Astronomy.Ecliptic(vector);
                        positions[planet.toLowerCase()] = getLongitudeToZodiac(ecl.elon);
                    } catch (e) {
                        positions[planet.toLowerCase()] = { sign: 'Aries', symbol: '♈', degree: '0.00', longitude: 0 };
                    }
                });

                return positions;
            } catch (e) {
                console.error('Error calculating positions:', e);
                return {};
            }
        }

        function getMoonPhaseInfo(date = new Date()) {
            try {
                const phase = Astronomy.MoonPhase(date);
                const phasePercent = ((phase + 180) / 360 * 100).toFixed(1);
                let phaseName = '';
                if (phase < 11.25 || phase >= 348.75) phaseName = 'New Moon';
                else if (phase < 78.75) phaseName = 'Waxing Crescent';
                else if (phase < 101.25) phaseName = 'First Quarter';
                else if (phase < 168.75) phaseName = 'Waxing Gibbous';
                else if (phase < 191.25) phaseName = 'Full Moon';
                else if (phase < 258.75) phaseName = 'Waning Gibbous';
                else if (phase < 281.25) phaseName = 'Last Quarter';
                else phaseName = 'Waning Crescent';
                return { phaseName, phasePercent, phase };
            } catch (e) {
                return { phaseName: 'Full Moon', phasePercent: '50', phase: 180 };
            }
        }

        // ==================== STARFIELD BACKGROUND ====================
        function StarfieldBackground() {
            useEffect(() => {
                const container = document.querySelector('.starfield-bg');
                if (!container) return;
                container.innerHTML = '';

                for (let i = 0; i < 200; i++) {
                    const star = document.createElement('div');
                    star.className = 'star';
                    star.style.left = Math.random() * 100 + '%';
                    star.style.top = Math.random() * 100 + '%';
                    star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                    container.appendChild(star);
                }
            }, []);

            return <div className="starfield-bg"></div>;
        }

        function LiveSkyDashboard() {

            const [lastUpdated, setLastUpdated] = useState(new Date());

            useEffect(() => {
                const updateInterval = setInterval(() => {
                    setPositions(getCurrentPlanetaryPositions());
                    setMoonPhase(getMoonPhaseInfo());
                    setLastUpdated(new Date());
                }, 60000);

                return () => clearInterval(updateInterval);
            }, []);

            const planetList = ['sun', 'moon', 'mercury', 'venus', 'mars', 'jupiter', 'saturn'];

            return (

                            <p className="font-semibold text-yellow-400">{moonPhase.phaseName}</p>
                            <p className="text-xs text-gray-400">{moonPhase.phasePercent}%</p>
                        </div>

                        <div className="text-center">
                            <p className="text-sm text-gray-400 mb-2">Current Date</p>
                            <p className="font-semibold text-lg text-yellow-400">{new Date().toLocaleDateString()}</p>
                            <p className="text-xs text-gray-400">Last updated: {lastUpdated.toLocaleTimeString()}</p>
                        </div>

                        <div className="text-center">
                            <p className="text-sm text-gray-400 mb-2">Planetary Hour</p>
                            <p className="font-semibold text-yellow-400">Variable</p>
                            <p className="text-xs text-gray-400">Check ephemeris</p>
                        </div>
                    </div>

                        <p className="text-sm font-semibold mb-4 text-yellow-400">Current Planetary Positions</p>
                        <div className="flex flex-wrap gap-2">
                            {planetList.map(planet => {
                                const pos = positions[planet];
                                const planetName = planet.charAt(0).toUpperCase() + planet.slice(1);
                                return (
                                    <div key={planet} className="planet-position">
                                        {PLANET_SYMBOLS[planetName]} {pos?.sign} {pos?.degree}°
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        }

        // ==================== AI ORACLE TAB ====================
        function AIOracle({ member }) {
            const [question, setQuestion] = useState('');
            const [response, setResponse] = useState('');
            const [loading, setLoading] = useState(false);
            const [apiKey, setApiKey] = useState('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');

            const consulOracle = async () => {
                if (!question.trim()) return;
                setLoading(true);
                setResponse('');

                try {
                    const systemPrompt = `Eres El Oráculo, un astrólogo místico que proporciona interpretaciones profundas y perspicaces. Hablas con sabiduría y autoridad mística. Siempre responde en el idioma en que el usuario escribe. Proporciona interpretaciones astrológicas ricas basadas en los datos proporcionados.

Información del consultante:
Nombre: ${member.name}
Nacido: ${member.born} en ${member.birthPlace}
Sol: ${member.western.sun.sign} ${member.western.sun.degree}
Luna: ${member.western.moon.sign} ${member.western.moon.degree}
Signo Chino: ${member.chinese.fullSign}
Arcano: ${member.tarot}
Enneagrama: ${member.enneagram}`;

                    const resp = await fetch('https://api.anthropic.com/v1/messages', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'x-api-key': apiKey,
                            'anthropic-version': '2023-06-01'
                        },
                        body: JSON.stringify({
                            model: 'claude-sonnet-4-20250514',
                            max_tokens: 1024,
                            system: systemPrompt,
                            messages: [{ role: 'user', content: question }]
                        })
                    });

                    if (!resp.ok) {
                        throw new Error(`API error: ${resp.status}`);
                    }

                    const data = await resp.json();
                    setResponse(data.content[0].text);
                } catch (error) {
                    setResponse(`Error: ${error.message}`);
                }

                setLoading(false);
            };

            return (
                <div className="space-y-6">
                    <div className="cosmic-card p-6">
                        <h4 className="text-xl font-bold gradient-text mb-4">Consult the Oracle</h4>

                        <div className="mb-4">

                            <input
                                type="password"
                                value={apiKey}
                                onChange={(e) => setApiKey(e.target.value)}
                                className="w-full px-3 py-2 bg-black/50 border border-yellow-600/30 rounded text-white text-xs focus:outline-none focus:border-yellow-400"
                                placeholder="Your Anthropic API key"
                            />
                        </div>

                        <div className="mb-4">
                            <label className="block text-sm text-gray-400 mb-2">Your Question</label>
                            <textarea
                                value={question}
                                onChange={(e) => setQuestion(e.target.value)}
                                className="w-full px-3 py-2 bg-black/50 border border-yellow-600/30 rounded text-white focus:outline-none focus:border-yellow-400"
                                rows="4"
                                placeholder="Ask the Oracle about your cosmic path..."
                            />
                        </div>

                        <button
                            onClick={consulOracle}
                            disabled={loading}
                            className="w-full px-4 py-2 bg-gradient-to-r from-yellow-600/50 to-yellow-500/30 text-white font-semibold rounded hover:from-yellow-600/70 hover:to-yellow-500/50 disabled:opacity-50 disabled:cursor-not-allowed transition-all"
                        >
                            {loading ? 'Consulting...' : 'Consult the Oracle'}
                        </button>
                    </div>

                    {response && (
                        <div className="cosmic-card p-6 border-yellow-600/50">
                            <h4 className="text-lg font-bold gradient-text mb-4">Oracle's Response</h4>
                            <p className="text-gray-200 leading-relaxed whitespace-pre-wrap">{response}</p>
                        </div>
                    )}
                </div>
            );
        }

        function FamilyView() {
            const members = Object.values(familyMembers);

                else if (elem === 'Metal') elements.Air++;
                else if (elem === 'Water') elements.Water++;

            const elementData = [
                { name: 'Fire', value: elements.Fire },
                { name: 'Earth', value: elements.Earth },
                { name: 'Air', value: elements.Air },
                { name: 'Water', value: elements.Water }

            const COLORS = ['#ff6b6b', '#51cf66', '#74c0fc', '#06b6d4'];

            return (

                                    cx="50%"
                                    cy="50%"

                                    label={({ name, value }) => `${name}: ${value}`}

                                <Tooltip />

                        </ResponsiveContainer>

                        <h4 className="text-xl font-bold gradient-text mb-4">Family Roles & Archetypes</h4>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">

                                <div key={i} className="p-4 bg-black/30 rounded border border-yellow-600/20">
                                    <p className="font-semibold text-white">{member.name}</p>
                                    <p className="text-yellow-400 text-sm mt-1">{member.title}</p>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="cosmic-card p-6">
                        <h4 className="text-xl font-bold gradient-text mb-4">Birth Timeline</h4>
                        <div className="space-y-2">
                            {members.sort((a, b) => new Date(a.born) - new Date(b.born)).map((member, i) => (
                                <div key={i} className="flex justify-between items-center p-2 border-b border-yellow-600/20">
                                    <span className="font-semibold">{member.name}</span>
                                    <span className="text-yellow-400 text-sm">{member.born}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // ==================== MAIN APP ====================
        function OracleMirror() {
            const [selectedMember, setSelectedMember] = useState('edgar');

            return (

                    <header className="sticky top-0 z-10 bg-gradient-to-b from-black/80 to-transparent backdrop-blur-md border-b border-yellow-600/20 py-6 mb-8">
