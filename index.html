        // ==================== ASTRONOMICAL CALCULATIONS ====================
        const ZODIAC_SIGNS = ['Aries', 'Taurus', 'Gemini', 'Cancer', 'Leo', 'Virgo', 'Libra', 'Scorpio', 'Sagittarius', 'Capricorn', 'Aquarius', 'Pisces'];
        const ZODIAC_SYMBOLS = ['♈', '♉', '♊', '♋', '♌', '♍', '♎', '♏', '♐', '♑', '♒', '♓'];
        const PLANET_SYMBOLS = {
            'Sun': '☉',
            'Moon': '☽',
            'Mercury': '☿',
            'Venus': '♀',
            'Mars': '♂',
            'Jupiter': '♃',
            'Saturn': '♄',
            'Uranus': '♅',
            'Neptune': '♆',
            'Pluto': '♇'
        };

        function getLongitudeToZodiac(longitude) {
            const normalizedLon = ((longitude % 360) + 360) % 360;
            const signIndex = Math.floor(normalizedLon / 30);
            const degree = normalizedLon % 30;
            const sign = ZODIAC_SIGNS[Math.min(signIndex, 11)];
            const symbol = ZODIAC_SYMBOLS[Math.min(signIndex, 11)];
            return { sign, symbol, degree: degree.toFixed(2), longitude: normalizedLon };
        }

        function getCurrentPlanetaryPositions() {
            try {
                const now = new Date();
                const positions = {};

                try {
                    const sunEcl = Astronomy.SunPosition(now);
                    positions.sun = getLongitudeToZodiac(sunEcl.elon);
                } catch (e) {
                    positions.sun = { sign: 'Aries', symbol: '♈', degree: '0.00', longitude: 0 };
                }

                try {
                    const moonEcl = Astronomy.EclipticGeoMoon(now);
                    positions.moon = getLongitudeToZodiac(moonEcl.lon);
                } catch (e) {
                    positions.moon = { sign: 'Cancer', symbol: '♋', degree: '0.00', longitude: 0 };
                }

                const planets = ['Mercury', 'Venus', 'Mars', 'Jupiter', 'Saturn', 'Uranus', 'Neptune', 'Pluto'];
                planets.forEach(planet => {
                    try {
                        const vector = Astronomy.GeoVector(planet, now, true);
                        const ecl = Astronomy.Ecliptic(vector);
                        positions[planet.toLowerCase()] = getLongitudeToZodiac(ecl.elon);
                    } catch (e) {
                        positions[planet.toLowerCase()] = { sign: 'Aries', symbol: '♈', degree: '0.00', longitude: 0 };
                    }
                });

                return positions;
            } catch (e) {
                console.error('Error calculating positions:', e);
                return {};
            }
        }

        function getMoonPhaseInfo(date = new Date()) {
            try {
                const phase = Astronomy.MoonPhase(date);
                const phasePercent = ((phase + 180) / 360 * 100).toFixed(1);
                let phaseName = '';
                if (phase < 11.25 || phase >= 348.75) phaseName = 'New Moon';
                else if (phase < 78.75) phaseName = 'Waxing Crescent';
                else if (phase < 101.25) phaseName = 'First Quarter';
                else if (phase < 168.75) phaseName = 'Waxing Gibbous';
                else if (phase < 191.25) phaseName = 'Full Moon';
                else if (phase < 258.75) phaseName = 'Waning Gibbous';
                else if (phase < 281.25) phaseName = 'Last Quarter';
                else phaseName = 'Waning Crescent';
                return { phaseName, phasePercent, phase };
            } catch (e) {
                return { phaseName: 'Full Moon', phasePercent: '50', phase: 180 };
            }
        }

                    star.style.top = Math.random() * 100 + '%';
                    star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                    container.appendChild(star);
                }
            }, []);

            return <div className="starfield-bg"></div>;

        // ==================== TRANSITS TAB (MULTI-TIMEFRAME) ====================
        function TransitsTab({ member, memberKey }) {
            const [period, setPeriod] = useState('hoy');
            const [reading, setReading] = useState(() => {
                // Load all cached readings from localStorage on mount
                const cached = {};
                const allPeriods = ['hoy','semana','mes','ano','3anos','5anos','decada'];
                allPeriods.forEach(p => {
                    const stored = loadReading(memberKey, 'transits', p);
                    if (stored) cached[p] = stored.text;
                });
                return cached;
            });
            const [loadingPeriod, setLoadingPeriod] = useState('');

            function seededRandom(seed) {
                const x = Math.sin(seed) * 10000;
                return x - Math.floor(x);
            }

            function getChartDataForPeriod(p) {
                const hash = (str) => {
                    let h = 0;
                    for (let i = 0; i < str.length; i++) h = ((h << 5) - h) + str.charCodeAt(i);
                    return h;
                };
                const baseSeed = hash(member.name + p);

                if (p === 'hoy') {
                    const hours = [];
                    for (let i = 0; i < 24; i++) {
                        const baseEnergy = 5 + 2 * Math.sin((i - 6) * Math.PI / 12);
                        const randomFactor = seededRandom(baseSeed + i) * 1.5;
                        hours.push({ hour: `${i}:00`, energy: Math.max(1, Math.min(10, baseEnergy + randomFactor)) });
                    }
                    return hours;
                } else if (p === 'semana') {
                    const days = ['Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb', 'Dom'];
                    return days.map((day, i) => ({
                        day,
                        energy: Math.max(2, Math.min(10, 5 + seededRandom(baseSeed + i) * 4))
                    }));
                } else if (p === 'mes') {
                    return ['Semana 1', 'Semana 2', 'Semana 3', 'Semana 4'].map((week, i) => ({
                        week,
                        energy: Math.max(2, Math.min(10, 5 + seededRandom(baseSeed + i) * 4))
                    }));
                } else if (p === 'ano') {
                    return member.monthlyEnergy2026.map((val, i) => ({
                        month: ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][i],
                        energy: val
                    }));
                } else if (p === '3anos') {
                    return [
                        { year: '2026', energy: 6 + seededRandom(baseSeed) * 3 },
                        { year: '2027', energy: 5 + seededRandom(baseSeed + 1) * 3 },
                        { year: '2028', energy: 7 + seededRandom(baseSeed + 2) * 3 }
                    ];
                } else if (p === '5anos') {
                    return Array.from({ length: 5 }, (_, i) => ({
                        year: String(2026 + i),
                        energy: 5 + seededRandom(baseSeed + i) * 4
                    }));
                } else if (p === 'decada') {
                    return Array.from({ length: 11 }, (_, i) => ({
                        year: String(2026 + i),
                        energy: 5 + seededRandom(baseSeed + i) * 4
                    }));
                }

            const chartData = getChartDataForPeriod(period);

                '5anos': `Dame la lectura astrológica de los PRÓXIMOS 5 AÑOS (2026-2030) para ${member.name}. Incluye: tránsitos de Saturno, Júpiter y planetas exteriores, transformaciones profundas, ciclos de vida.`,
                decada: `Dame la lectura astrológica de la PRÓXIMA DÉCADA (2026-2036) para ${member.name}. Incluye: grandes ciclos planetarios (retorno de Saturno si aplica, tránsitos de Plutón/Neptuno/Urano), evolución del alma, destino cósmico.`

                                <XAxis dataKey={period === 'hoy' ? 'hour' : period === 'semana' ? 'day' : period === 'mes' ? 'week' : (period === 'ano' ? 'month' : 'year')} stroke="#808080" style={{ fontSize: '11px' }} />

                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {activeSection === 'numerology' && (
                        <div className="space-y-6">
                            <div className="cosmic-card p-6">
                                <h4 className="text-xl font-bold gradient-text mb-4">Comparativa Numerológica</h4>
                                <ResponsiveContainer width="100%" height={400}>
                                    <BarChart data={numCompareData} barGap={2}>
                                        <CartesianGrid strokeDasharray="3 3" stroke="rgba(212,165,116,0.2)" />
                                        <XAxis dataKey="name" stroke="#a0a0a0" style={{ fontSize: '12px' }} />
                                        <YAxis stroke="#a0a0a0" />
                                        <Tooltip contentStyle={{ background: '#1a0a2e', border: '2px solid #d4a574', borderRadius: '8px', boxShadow: '0 0 15px rgba(212,165,116,0.3)' }} cursor={{ fill: 'rgba(212,165,116,0.1)' }} />
                                        <Legend />
                                        {members.map((m, i) => (
                                            <Bar key={i} dataKey={m.name.split(' ')[0]} fill={MEMBER_COLORS[i]} radius={[6,6,0,0]} isAnimationActive={true} />
                                        ))}
                                    </BarChart>
                                </ResponsiveContainer>
                            </div>

                            <div className="cosmic-card p-6">
                                <h4 className="text-xl font-bold gradient-text mb-4">Perfil Numerológico por Miembro</h4>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                                    {members.map((m, i) => {
                                        const rd = [
                                            { name: 'LP', value: m.numerology.lifePath || 0 },
                                            { name: 'Exp', value: typeof m.numerology.expression === 'number' ? m.numerology.expression : 0 },
                                            { name: 'Alma', value: m.numerology.soulUrge || 0 },
                                            { name: 'Pers', value: m.numerology.personality || 0 },
                                            { name: 'Mad', value: m.numerology.maturity || 0 }
                                        ];
                                        return (
                                            <div key={i} className="p-4 bg-black/30 rounded-lg border border-yellow-600/20">
                                                <p className="text-center font-bold text-white mb-2">{m.name.split(' ')[0]}</p>
                                                <ResponsiveContainer width="100%" height={180}>
                                                    <RadarChart data={rd}>
                                                        <PolarGrid stroke="rgba(212,165,116,0.3)" />
                                                        <PolarAngleAxis dataKey="name" stroke="#a0a0a0" tick={{ fontSize: 10 }} />
                                                        <PolarRadiusAxis stroke="#606060" domain={[0, 10]} tick={{ fontSize: 8 }} />
                                                        <Tooltip contentStyle={{ background: '#1a0a2e', border: '1px solid #d4a574', borderRadius: '6px' }} />
                                                        <Radar dataKey="value" stroke={MEMBER_COLORS[i]} fill={MEMBER_COLORS[i]} fillOpacity={0.35} isAnimationActive={true} dot={{ fill: MEMBER_COLORS[i], r: 3 }} />
                                                    </RadarChart>
                                                </ResponsiveContainer>
                                                <p className="text-center text-yellow-400 text-sm">Año Personal 2026: <strong>{m.numerology.personalYear2026}</strong></p>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    )}

                    {activeSection === 'energy' && (
                        <div className="space-y-6">
                            <div className="cosmic-card p-6">
                                <h4 className="text-xl font-bold gradient-text mb-4">Pronóstico Energético 2026 — Comparativa Familiar</h4>
                                <ResponsiveContainer width="100%" height={400}>
                                    <AreaChart data={energyData}>
                                        <defs>
                                            {activeMembers.map((m, i) => (
                                                <linearGradient key={i} id={`areaGrad${i}`} x1="0" y1="0" x2="0" y2="1">
                                                    <stop offset="5%" stopColor={MEMBER_COLORS[i]} stopOpacity={0.8}/>
                                                    <stop offset="95%" stopColor={MEMBER_COLORS[i]} stopOpacity={0.05}/>
                                                </linearGradient>
                                            ))}
                                        </defs>
                                        <CartesianGrid strokeDasharray="3 3" stroke="rgba(212,165,116,0.2)" />
                                        <XAxis dataKey="name" stroke="#a0a0a0" style={{ fontSize: '12px' }} />
                                        <YAxis stroke="#a0a0a0" domain={[0, 10]} />
                                        <Tooltip contentStyle={{ background: '#1a0a2e', border: '2px solid #d4a574', borderRadius: '8px', boxShadow: '0 0 15px rgba(212,165,116,0.3)' }} cursor={{ fill: 'rgba(212,165,116,0.1)' }} />
                                        <Legend />
                                        {activeMembers.map((m, i) => (
                                            <Area key={i} type="monotone" dataKey={m.name.split(' ')[0]} stroke={MEMBER_COLORS[i]}
                                                fill={`url(#areaGrad${i})`} fillOpacity={1} strokeWidth={3} dot={{ fill: MEMBER_COLORS[i], r: 3 }} activeDot={{ r: 5 }} isAnimationActive={true} />
                                        ))}
                                    </AreaChart>
                                </ResponsiveContainer>
                            </div>

                            <div className="cosmic-card p-6">
                                <h4 className="text-xl font-bold gradient-text mb-4">Picos Energéticos por Miembro</h4>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    {activeMembers.map((m, i) => {
                                        const maxE = Math.max(...m.monthlyEnergy2026);
                                        const maxMonth = months[m.monthlyEnergy2026.indexOf(maxE)];
                                        const minE = Math.min(...m.monthlyEnergy2026.filter(e => e > 0));
                                        const minMonth = months[m.monthlyEnergy2026.indexOf(minE)];
                                        return (
                                            <div key={i} className="p-4 bg-black/30 rounded-lg border-l-4" style={{ borderLeftColor: MEMBER_COLORS[i] }}>
                                                <p className="font-bold text-white">{m.name.split(' ')[0]}</p>
                                                <div className="mt-2 space-y-1">
                                                    <p className="text-green-400 text-sm">⬆ Mejor mes: <strong>{maxMonth}</strong> (energía {maxE})</p>
                                                    <p className="text-red-400 text-sm">⬇ Mes bajo: <strong>{minMonth}</strong> (energía {minE})</p>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    )}

                    {activeSection === 'zodiac' && (
                        <div className="space-y-6">
                            <div className="cosmic-card p-6">
                                <h4 className="text-xl font-bold gradient-text mb-4">Distribución Solar de la Familia</h4>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <ResponsiveContainer width="100%" height={280}>
                                        <PieChart>
                                            <Pie data={sunSignData} cx="50%" cy="50%" outerRadius={100} innerRadius={40}
                                                label={({ name, value }) => `${name}: ${value}`} dataKey="value" isAnimationActive={true}>
                                                {sunSignData.map((_, i) => <Cell key={i} fill={MEMBER_COLORS[i % MEMBER_COLORS.length]} />)}
                                            </Pie>
                                            <Tooltip contentStyle={{ background: '#1a0a2e', border: '1px solid #d4a574', borderRadius: '6px' }} />
                                        </PieChart>
                                    </ResponsiveContainer>
                                    <div className="flex flex-col justify-center space-y-4">
                                        {members.map((m, i) => (
                                            <div key={i} className="flex items-center gap-3">
                                                <span className="text-xl">{m.isPending ? '✨' : ZODIAC_SYMBOLS[ZODIAC_SIGNS.indexOf(m.western.sun.sign)]}</span>
                                                <span className="text-white font-semibold w-24">{m.name.split(' ')[0]}</span>
                                                <span className="text-yellow-400">{m.western.sun.sign} {m.western.sun.degree}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            <div className="cosmic-card p-6">
                                <h4 className="text-xl font-bold gradient-text mb-4">Zodíaco Chino — Animales de la Familia</h4>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                                    {members.map((m, i) => {
                                        const animalEmojis = { Rat: '🐀', Pig: '🐷', Horse: '🐴', Monkey: '🐵' };
                                        return (
                                            <div key={i} className="p-4 bg-black/30 rounded-lg border border-yellow-600/20 text-center">
                                                <div className="text-4xl mb-2">{animalEmojis[m.chinese.animal] || '🌟'}</div>
                                                <p className="font-bold text-white">{m.name.split(' ')[0]}</p>
                                                <p className="text-yellow-400 text-sm">{m.chinese.fullSign}</p>
                                                <p className="text-gray-400 text-xs mt-1">Elemento: {m.chinese.element}</p>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>

                            <div className="cosmic-card p-6">
                                <h4 className="text-xl font-bold gradient-text mb-4">I Ching Familiar</h4>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                                    {members.map((m, i) => (
                                        <div key={i} className="p-4 bg-black/30 rounded-lg border border-yellow-600/20 text-center">
                                            <p className="text-3xl font-bold text-yellow-400 mb-1">☰ {m.iChing.hex}</p>
                                            <p className="font-bold text-white">{m.name.split(' ')[0]}</p>
                                            <p className="text-yellow-400 text-sm">{m.iChing.name}</p>
                                            <p className="text-gray-400 text-xs mt-1">{m.iChing.meaning}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {activeSection === 'oracle' && (
                        <div className="space-y-6">
                            <div className="cosmic-card p-8 text-center">
                                <h3 className="text-3xl font-bold gradient-text mb-4">🔮 Oráculo de la Familia Boone</h3>
                                <p className="text-gray-400 mb-6">Consulta al Oráculo cósmico para un análisis profundo de las sinergias, dinámicas y destino colectivo de la familia.</p>
                                {!familyReading && !isLoadingReading && (
                                    <button onClick={getFamilyReading}
                                        className="px-8 py-4 rounded-lg text-lg font-bold transition-all hover:scale-105"
                                        style={{ background: 'linear-gradient(135deg, #d4a574, #f0d78c)', color: '#1a0a2e' }}>
                                        ✨ Consultar Oráculo Familiar ✨
                                    </button>
                                )}
                                {isLoadingReading && (
                                    <div className="flex flex-col items-center gap-4">
                                        <div className="w-12 h-12 border-4 border-yellow-400 border-t-transparent rounded-full animate-spin"></div>
                                        <p className="text-yellow-400 italic">El Oráculo analiza la constelación familiar...</p>
                                    </div>
                                )}
                            </div>
                            {familyReading && (
                                <div className="cosmic-card p-8">
                                    <div className="prose prose-invert max-w-none" style={{ whiteSpace: 'pre-wrap', lineHeight: '1.8' }}>
                                        {familyReading.split('\n').map((line, i) => {
                                            if (line.startsWith('##')) return <h3 key={i} className="text-xl font-bold gradient-text mt-6 mb-3">{line.replace(/##\s*/, '')}</h3>;
                                            if (line.startsWith('**') && line.endsWith('**')) return <h4 key={i} className="text-lg font-bold text-yellow-400 mt-4 mb-2">{line.replace(/\*\*/g, '')}</h4>;
                                            if (line.trim() === '') return <br key={i} />;
                                            return <p key={i} className="text-gray-300 mb-2">{line.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').split('<strong>').map((part, j) => {
                                                if (part.includes('</strong>')) {
                                                    const [bold, rest] = part.split('</strong>');
                                                    return <React.Fragment key={j}><strong className="text-yellow-400">{bold}</strong>{rest}</React.Fragment>;
                                                }
                                                return part;
                                            })}</p>;
                                        })}
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        // ==================== LOGIN SCREEN ====================
        function LoginScreen({ onLogin }) {
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            async function handleLogin(e) {
                e.preventDefault();
                setError('');
                setLoading(true);
                try {
                    const resp = await fetch('/api/auth', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username: username.trim(), password })
                    });
                    const data = await resp.json();
                    if (resp.ok && data.success) {
                        sessionStorage.setItem('oracle_token', data.token);
                        sessionStorage.setItem('oracle_user', data.user);
                        onLogin(data.user, data.displayName);
                    } else {
                        setError(data.error || 'Credenciales inválidas');
                    }
                } catch (err) {
                    setError('Error de conexión. Intenta de nuevo.');
                }
                setLoading(false);
            }

            return (
                <div className="min-h-screen flex items-center justify-center relative" style={{ background: 'linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #16213e 100%)' }}>
                    <StarfieldBackground />
                    <div className="relative z-10 w-full max-w-md mx-4">
                        <div className="text-center mb-8">
                            <h1 className="text-5xl md:text-6xl font-bold gradient-text gold-shimmer mb-3" style={{ fontFamily: 'Cinzel, serif' }}>
                                The Oracle's Mirror
                            </h1>
                            <p className="text-yellow-400 text-lg" style={{ fontFamily: 'Playfair Display, serif' }}>
                                Boone Family Cosmic Portal
                            </p>
                            <div className="mt-4 text-6xl">🔮</div>
                        </div>

                        <form onSubmit={handleLogin} className="cosmic-card p-8 space-y-6">
                            <h2 className="text-2xl font-bold text-center gradient-text" style={{ fontFamily: 'Cinzel, serif' }}>
                                Acceso al Portal
                            </h2>

                            {error && (
                                <div className="bg-red-900/30 border border-red-500/50 rounded-lg p-3 text-center">
                                    <p className="text-red-300 text-sm">⚠️ {error}</p>
                                </div>
                            )}

                            <div>
                                <label className="block text-yellow-400 text-sm font-semibold mb-2" style={{ fontFamily: 'Cinzel, serif' }}>
                                    ✦ Usuario
                                </label>
                                <input
                                    type="text"
                                    value={username}
                                    onChange={e => setUsername(e.target.value)}
                                    className="w-full px-4 py-3 rounded-lg bg-black/50 border border-yellow-600/30 text-white placeholder-gray-500 focus:outline-none focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400/50 transition-all"
                                    placeholder="Tu nombre de usuario"
                                    autoComplete="username"
                                    required
                                />
                            </div>

                            <div>
                                <label className="block text-yellow-400 text-sm font-semibold mb-2" style={{ fontFamily: 'Cinzel, serif' }}>
                                    ✦ Contraseña
                                </label>
                                <input
                                    type="password"
                                    value={password}
                                    onChange={e => setPassword(e.target.value)}
                                    className="w-full px-4 py-3 rounded-lg bg-black/50 border border-yellow-600/30 text-white placeholder-gray-500 focus:outline-none focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400/50 transition-all"
                                    placeholder="Tu contraseña"
                                    autoComplete="current-password"
                                    required
                                />
                            </div>

                            <button
                                type="submit"
                                disabled={loading}
                                className="w-full py-3 rounded-lg font-bold text-lg transition-all hover:scale-105 disabled:opacity-50 disabled:hover:scale-100"
                                style={{ background: 'linear-gradient(135deg, #d4a574, #f0d78c)', color: '#1a0a2e', fontFamily: 'Cinzel, serif' }}
                            >
                                {loading ? (
                                    <span className="flex items-center justify-center gap-2">
                                        <span className="w-5 h-5 border-2 border-current border-t-transparent rounded-full animate-spin"></span>
                                        Consultando los astros...
                                    </span>
                                ) : (
                                    '✨ Entrar al Portal ✨'
                                )}
                            </button>
                        </form>

                        <p className="text-center text-gray-500 text-xs mt-6">
                            Portal exclusivo para la Familia Boone
                        </p>
                    </div>
                </div>
            );
        }

        // ==================== MAIN APP ====================
        function OracleMirror() {
            const [selectedMember, setSelectedMember] = useState('edgar');
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [currentUser, setCurrentUser] = useState('');
            const [displayName, setDisplayName] = useState('');
            const [authChecking, setAuthChecking] = useState(true);

            useEffect(() => {
                async function checkSession() {
                    const token = sessionStorage.getItem('oracle_token');
                    if (!token) {
                        setAuthChecking(false);
                        return;
                    }
                    try {
                        const resp = await fetch('/api/verify', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ token })
                        });
                        const data = await resp.json();
                        if (data.valid) {
                            setIsAuthenticated(true);
                            setCurrentUser(data.user);
                            setDisplayName(data.displayName);
                        } else {
                            sessionStorage.removeItem('oracle_token');
                            sessionStorage.removeItem('oracle_user');
                        }
                    } catch (e) {
                        sessionStorage.removeItem('oracle_token');
                        sessionStorage.removeItem('oracle_user');
                    }
                    setAuthChecking(false);
                }
                checkSession();
            }, []);

            function handleLogin(user, name) {
                setIsAuthenticated(true);
                setCurrentUser(user);
                setDisplayName(name);
            }

            function handleLogout() {
                sessionStorage.removeItem('oracle_token');
                sessionStorage.removeItem('oracle_user');
                setIsAuthenticated(false);
                setCurrentUser('');
                setDisplayName('');
            }

            if (authChecking) {
                return (
                    <div className="min-h-screen flex items-center justify-center" style={{ background: 'linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #16213e 100%)' }}>
                        <div className="text-center">
                            <div className="text-6xl mb-4">🔮</div>
                            <div className="w-10 h-10 border-4 border-yellow-400 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                            <p className="text-yellow-400" style={{ fontFamily: 'Cinzel, serif' }}>Alineando los astros...</p>
                        </div>
                    </div>
                );
            }

            if (!isAuthenticated) {
                return <LoginScreen onLogin={handleLogin} />;
            }

            return (
                <div className="main-content">
                    <StarfieldBackground />

                    <header className="sticky top-0 z-10 bg-gradient-to-b from-black/80 to-transparent backdrop-blur-md border-b border-yellow-600/20 py-6 mb-8">
                        <div className="max-w-7xl mx-auto px-4">
                            <div className="flex justify-between items-center">
                                <div className="flex-1"></div>
                                <div className="text-center flex-shrink-0">
                                    <h1 className="text-5xl md:text-6xl font-bold gradient-text gold-shimmer mb-2" style={{ fontFamily: 'Cinzel, serif' }}>
                                        The Oracle's Mirror
                                    </h1>
                                    <p className="text-yellow-400 text-lg" style={{ fontFamily: 'Playfair Display, serif' }}>
                                        Boone Family Cosmic Portal
                                    </p>
                                </div>
                                <div className="flex-1 flex justify-end items-center gap-3">
                                    <span className="text-yellow-400 text-sm hidden md:inline" style={{ fontFamily: 'Cinzel, serif' }}>
                                        ✦ {displayName}
                                    </span>
                                    <button
                                        onClick={handleLogout}
                                        className="px-3 py-1.5 rounded-lg text-xs font-semibold bg-black/30 text-gray-400 border border-yellow-600/20 hover:text-yellow-300 hover:border-yellow-400/50 transition-all"
                                    >
                                        Salir
                                    </button>
                                </div>
                            </div>
                        </div>
                    </header>

                    <div className="max-w-7xl mx-auto px-4 pb-12">
                        <LiveSkyDashboard />
                        <FamilySelector selected={selectedMember} onSelect={setSelectedMember} />

                        {selectedMember === 'family' ? (
                            <FamilyView />
                        ) : (
                            <PersonContainer personKey={selectedMember} />
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<OracleMirror />);
    </script>
</body>
</html>
